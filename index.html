<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Piton IDE - Compiler Python Indonesia</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
}

/* Header */
header {
    background: #252526;
    border-bottom: 1px solid #3e3e42;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
}

.header-title .logo {
    font-size: 20px;
}

.header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}

.status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: #2d2d30;
    border-radius: 4px;
    font-size: 12px;
    color: #4ec9b0;
}

.status-indicator.loading {
    color: #ce9178;
}

.status-indicator.error {
    color: #f48771;
}

.status-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Main Container */
.main-container {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* Sidebar */
.sidebar {
    width: 300px;
    background: #252526;
    border-right: 1px solid #3e3e42;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-section {
    border-bottom: 1px solid #3e3e42;
}

.sidebar-header {
    padding: 12px 15px;
    background: #2d2d30;
    color: #ffffff;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.sidebar-content {
    overflow-y: auto;
    flex: 1;
    padding: 10px 0;
}

.kamus-item {
    padding: 8px 15px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.kamus-item:hover {
    background: #2d2d30;
    border-left-color: #007acc;
}

.kamus-piton {
    color: #9cdcfe;
    font-weight: 600;
}

.kamus-python {
    color: #6a9955;
    font-size: 12px;
}

/* Editor Area */
.editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.editor-tabs {
    display: flex;
    background: #1e1e1e;
    border-bottom: 1px solid #3e3e42;
    height: 40px;
}

.editor-tab {
    padding: 0 15px;
    border: none;
    background: transparent;
    color: #858585;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-size: 13px;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.editor-tab.active {
    color: #ffffff;
    border-bottom-color: #007acc;
    background: #252526;
}

.editor-tab:hover {
    background: #2d2d30;
}

.editor-container {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: #1e1e1e;
}

.CodeMirror {
    flex: 1 !important;
    height: auto !important;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
    background: #1e1e1e !important;
}

.CodeMirror-scrollbar-filler {
    background: #1e1e1e !important;
}

.CodeMirror-gutters {
    background: #1e1e1e !important;
    border-right: 1px solid #3e3e42 !important;
}

.CodeMirror-linenumber {
    color: #858585 !important;
    padding-right: 15px !important;
}

.CodeMirror-line {
    padding-left: 10px !important;
}

/* Output Panel */
.output-container {
    background: #1e1e1e;
    border-top: 1px solid #3e3e42;
    display: flex;
    flex-direction: column;
    max-height: 280px;
    min-height: 150px;
}

.output-header {
    padding: 10px 15px;
    background: #252526;
    border-bottom: 1px solid #3e3e42;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: #ffffff;
}

.output-controls {
    display: flex;
    gap: 8px;
}

.btn-icon {
    background: transparent;
    border: none;
    color: #858585;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    transition: all 0.2s;
}

.btn-icon:hover {
    background: #3e3e42;
    color: #ffffff;
}

.output-content {
    flex: 1;
    overflow: auto;
    padding: 12px 15px;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
}

.output-content.success {
    color: #4ec9b0;
}

.output-content.error {
    color: #f48771;
}

.output-content.loading {
    color: #ce9178;
}

/* Run Button */
.run-button-container {
    padding: 10px 15px;
    background: #252526;
    border-top: 1px solid #3e3e42;
    display: flex;
    gap: 8px;
}

.btn-run {
    flex: 1;
    padding: 10px 20px;
    background: #007acc;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-run:hover:not(:disabled) {
    background: #005a9e;
}

.btn-run:active:not(:disabled) {
    transform: scale(0.98);
}

.btn-run:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn-clear {
    padding: 10px 15px;
    background: #3e3e42;
    color: #ffffff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-clear:hover {
    background: #555555;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: #1e1e1e;
}

::-webkit-scrollbar-thumb {
    background: #464647;
    border-radius: 6px;
}

::-webkit-scrollbar-thumb:hover {
    background: #5a5a5a;
}

/* Responsive */
@media (max-width: 900px) {
    .sidebar {
        width: 250px;
    }
}

@media (max-width: 600px) {
    .main-container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        height: 200px;
        border-right: none;
        border-bottom: 1px solid #3e3e42;
    }

    .output-container {
        max-height: 200px;
    }
}
</style>
</head>
<body>

<!-- Header -->
<header>
    <div class="header-title">
        <span class="logo">🐍</span>
        <span>Piton IDE</span>
        <span style="font-size: 12px; color: #858585; margin-left: 10px;">Beta</span>
    </div>
    <div class="header-actions">
        <div class="status-indicator" id="status">
            <span class="dot"></span>
            <span id="status-text">Loading...</span>
        </div>
    </div>
</header>

<!-- Main Container -->
<div class="main-container">
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-header">📖 Kamus Piton</div>
            <div class="sidebar-content" id="kamus-list"></div>
        </div>
    </div>

    <!-- Editor Area -->
    <div class="editor-area">
        
        <!-- Tabs -->
        <div class="editor-tabs">
            <button class="editor-tab active">
                <span>📄</span>
                <span>main.piton</span>
            </button>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <textarea id="code">ketik("Selamat datang di Piton IDE!")
ketik("Bahasa pemrograman Indonesia 🇮🇩")</textarea>
        </div>

        <!-- Output Panel -->
        <div class="output-container">
            <div class="output-header">
                <span>📤 OUTPUT TERMINAL</span>
                <div class="output-controls">
                    <button class="btn-icon" onclick="clearOutput()">🗑️</button>
                </div>
            </div>
            <div class="output-content" id="output">⏳ Memuat Piton...</div>
        </div>

        <!-- Run Button -->
        <div class="run-button-container">
            <button class="btn-run" id="btn-run" onclick="runPiton()">
                <span>▶</span>
                <span>Jalankan (Ctrl+Enter)</span>
            </button>
            <button class="btn-clear" onclick="clearCode()">Bersihkan</button>
        </div>
    </div>

</div>

<script>
const KAMUS_TABEL = [
    { kategori: "Input / Output", piton: "ketik", python: "print" },
    { kategori: "Input / Output", piton: "terima", python: "input" },
    { kategori: "Input / Output", piton: "buka", python: "open" },
    { kategori: "Input / Output", piton: "tutup", python: "close" },
    { kategori: "Input / Output", piton: "baca", python: "read" },
    { kategori: "Input / Output", piton: "tulis_file", python: "write" },
    
    { kategori: "Fungsi & Kelas", piton: "buat", python: "def" },
    { kategori: "Fungsi & Kelas", piton: "kembalikan", python: "return" },
    { kategori: "Fungsi & Kelas", piton: "wadah", python: "class" },
    { kategori: "Fungsi & Kelas", piton: "anon", python: "lambda" },
    { kategori: "Fungsi & Kelas", piton: "serahkan", python: "yield" },
    
    { kategori: "Logika", piton: "jika", python: "if" },
    { kategori: "Logika", piton: "jikalau", python: "elif" },
    { kategori: "Logika", piton: "selain", python: "else" },
    { kategori: "Logika", piton: "pasti", python: "assert" },
    
    { kategori: "Perulangan", piton: "putar", python: "while" },
    { kategori: "Perulangan", piton: "ulangi", python: "for" },
    { kategori: "Perulangan", piton: "henti", python: "break" },
    { kategori: "Perulangan", piton: "lanjut", python: "continue" },
    { kategori: "Perulangan", piton: "lewat", python: "pass" },
    
    { kategori: "Tipe Data", piton: "teks", python: "str" },
    { kategori: "Tipe Data", piton: "bilangan", python: "int" },
    { kategori: "Tipe Data", piton: "desimal", python: "float" },
    { kategori: "Tipe Data", piton: "logika", python: "bool" },
    { kategori: "Tipe Data", piton: "daftar", python: "list" },
    { kategori: "Tipe Data", piton: "kamus", python: "dict" },
    { kategori: "Tipe Data", piton: "panjang", python: "len" },
    { kategori: "Tipe Data", piton: "jenis", python: "type" },
    { kategori: "Tipe Data", piton: "rentang", python: "range" },
    
    { kategori: "Boolean", piton: "BENAR", python: "True" },
    { kategori: "Boolean", piton: "SALAH", python: "False" },
    { kategori: "Boolean", piton: "KOSONG", python: "None" },
    
    { kategori: "Operator", piton: "dan", python: "and" },
    { kategori: "Operator", piton: "atau", python: "or" },
    { kategori: "Operator", piton: "bukan", python: "not" },
    { kategori: "Operator", piton: "dalam", python: "in" },
    { kategori: "Operator", piton: "adalah", python: "is" },
    
    { kategori: "Modul", piton: "ambil", python: "import" },
    { kategori: "Modul", piton: "dari", python: "from" },
    { kategori: "Modul", piton: "sebagai", python: "as" },
    
    { kategori: "Error", piton: "coba", python: "try" },
    { kategori: "Error", piton: "tangkapi", python: "except" },
    { kategori: "Error", piton: "bersihkan", python: "finally" },
    { kategori: "Error", piton: "lontar", python: "raise" },
    
    { kategori: "Variabel", piton: "umum", python: "global" },
    { kategori: "Variabel", piton: "lokal", python: "nonlocal" },
    { kategori: "Variabel", piton: "hapus", python: "del" },
    
    { kategori: "Math", piton: "maks", python: "max" },
    { kategori: "Math", piton: "min", python: "min" },
    { kategori: "Math", piton: "total", python: "sum" },
    { kategori: "Math", piton: "urut", python: "sorted" },
    
    { kategori: "Special", piton: "__nama__", python: "__name__" },
    { kategori: "Special", piton: "__utama__", python: "__main__" }
];

// Populate sidebar kamus
const kamusList = document.getElementById('kamus-list');
KAMUS_TABEL.forEach(item => {
    const div = document.createElement('div');
    div.className = 'kamus-item';
    div.innerHTML = `<span class="kamus-piton">${item.piton}</span><span class="kamus-python">${item.python}</span>`;
    div.onclick = () => insertCode(item.piton);
    kamusList.appendChild(div);
});

// Create translation maps
const MAP_IO = { 'ketik': 'print', 'terima': 'input', 'buka': 'open', 'tutup': 'close', 'baca': 'read', 'tulis_file': 'write' };
const MAP_FUNC = { 'buat': 'def', 'kembalikan': 'return', 'wadah': 'class', 'anon': 'lambda', 'serahkan': 'yield' };
const MAP_LOGIC = { 'jika': 'if', 'jikalau': 'elif', 'selain': 'else', 'pasti': 'assert' };
const MAP_LOOP = { 'putar': 'while', 'ulangi': 'for', 'henti': 'break', 'lanjut': 'continue', 'lewat': 'pass' };
const MAP_TYPES = { 'teks': 'str', 'bilangan': 'int', 'desimal': 'float', 'logika': 'bool', 'daftar': 'list', 'kamus': 'dict', 'panjang': 'len', 'jenis': 'type', 'rentang': 'range' };
const MAP_BOOL = { 'BENAR': 'True', 'SALAH': 'False', 'KOSONG': 'None' };
const MAP_OP = { 'dan': 'and', 'atau': 'or', 'bukan': 'not', 'dalam': 'in', 'adalah': 'is' };
const MAP_IMPORT = { 'ambil': 'import', 'dari': 'from', 'sebagai': 'as' };
const MAP_ERROR = { 'coba': 'try', 'tangkapi': 'except', 'bersihkan': 'finally', 'lontar': 'raise' };
const MAP_SCOPE = { 'umum': 'global', 'lokal': 'nonlocal', 'hapus': 'del' };
const MAP_MATH = { 'maks': 'max', 'min': 'min', 'total': 'sum', 'urut': 'sorted' };
const MAP_SPECIAL = { '__nama__': '__name__', '__utama__': '__main__' };
const MAP = { ...MAP_IO, ...MAP_FUNC, ...MAP_LOGIC, ...MAP_LOOP, ...MAP_TYPES, ...MAP_BOOL, ...MAP_OP, ...MAP_IMPORT, ...MAP_ERROR, ...MAP_SCOPE, ...MAP_MATH, ...MAP_SPECIAL };

// Initialize CodeMirror
let editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode: "python",
    theme: "material-darker",
    lineNumbers: true,
    indentUnit: 4,
    matchBrackets: true,
    indentWithTabs: false,
    tabSize: 4
});

function ubahPitonKePython(kode) {
    let strings = [];
    let i = 0;

    kode = kode.replace(/"([^"\\]*(\\.[^"\\]*)*)"|'([^'\\]*(\\.[^'\\]*)*)'/g, function(match) {
        strings.push(match);
        return `__STR${i++}__`;
    });

    const sortedKeys = Object.keys(MAP).sort((a, b) => b.length - a.length);

    for (let kata of sortedKeys) {
        const regex = new RegExp('\\b' + kata.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g');
        kode = kode.replace(regex, MAP[kata]);
    }

    for (let j = 0; j < strings.length; j++) {
        kode = kode.replace(`__STR${j}__`, strings[j]);
    }

    return kode;
}

let pyodide = null;

// Initialize Pyodide
setTimeout(async () => {
    try {
        pyodide = await loadPyodide();
        updateStatus("Siap", "ready");
        document.getElementById("output").textContent = "✅ Piton siap digunakan!";
    } catch (e) {
        updateStatus("Gagal memuat", "error");
        document.getElementById("output").textContent = "❌ Gagal memuat Piton:\n" + e.toString();
    }
}, 1000);

function updateStatus(text, type) {
    const status = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    
    status.className = "status-indicator";
    if (type === "loading") status.classList.add("loading");
    if (type === "error") status.classList.add("error");
    
    statusText.textContent = text;
}

function insertCode(code) {
    const pos = editor.getCursor();
    editor.replaceRange(code + "()", pos);
    editor.focus();
}

function clearOutput() {
    document.getElementById("output").textContent = "";
}

function clearCode() {
    if (confirm("Bersihkan semua kode?")) {
        editor.setValue("");
    }
}

async function runPiton() {
    const output = document.getElementById("output");
    const btnRun = document.getElementById("btn-run");

    if (!pyodide) {
        output.textContent = "⏳ Piton masih loading...";
        output.className = "output-content loading";
        return;
    }

    btnRun.disabled = true;
    output.textContent = "⏳ Menjalankan...";
    output.className = "output-content loading";
    updateStatus("Menjalankan", "loading");

    let kodePiton = editor.getValue();
    if (!kodePiton.trim()) {
        output.textContent = "⚠️ Kode masih kosong. Tulis kode Piton terlebih dahulu!";
        output.className = "output-content";
        btnRun.disabled = false;
        updateStatus("Siap", "ready");
        return;
    }

    let kodePython = ubahPitonKePython(kodePiton);

    try {
        pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
        `);

        pyodide.runPython(kodePython);

        let hasil = pyodide.runPython("sys.stdout.getvalue()") || "✔️ Selesai (tidak ada output)";

        output.textContent = hasil;
        output.className = "output-content success";
        updateStatus("Berhasil", "ready");
    } catch (e) {
        output.textContent = "❌ ERROR:\n" + e.toString();
        output.className = "output-content error";
        updateStatus("Error", "error");
    }

    btnRun.disabled = false;
}

// Keyboard shortcut: Ctrl+Enter to run
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runPiton();
    }
});
</script>

</body>
</html>
