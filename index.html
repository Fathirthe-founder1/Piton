<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piton IDE - Compiler Bahasa Pemrograman Indonesia</title>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #e0e0e0;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        header {
            background: #161b22;
            border-bottom: 2px solid #f1c40f;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(241, 196, 15, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: #f1c40f;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s;
        }

        .menu-toggle:hover {
            transform: scale(1.1);
            text-shadow: 0 0 10px #f1c40f;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #f1c40f;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px #f1c40f;
            letter-spacing: 2px;
        }

        .logo-text {
            font-size: 16px;
            color: #f1c40f;
        }

        .run-btn {
            background: #f1c40f;
            color: #0d1117;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        .run-btn:hover {
            background: #f39c12;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 50%;
            height: 100vh;
            background: #161b22;
            border-right: 2px solid #f1c40f;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            background: #0d1117;
            padding: 15px;
            border-bottom: 1px solid #f1c40f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 8px #f1c40f;
        }

        .sidebar-close {
            background: none;
            border: none;
            color: #f1c40f;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s;
        }

        .sidebar-close:hover {
            transform: rotate(90deg);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .kamus-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .kamus-table th {
            background: #0d1117;
            color: #f1c40f;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #f1c40f;
            font-weight: bold;
            text-shadow: 0 0 8px #f1c40f;
        }

        .kamus-table td {
            padding: 10px;
            border-bottom: 1px solid #3498db;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .kamus-table tr:hover {
            background: #0d1117;
            box-shadow: inset 0 0 10px rgba(244, 196, 15, 0.2);
        }

        .kamus-kategori {
            color: #3498db;
            font-weight: bold;
        }

        .kamus-piton {
            color: #ff79c6;
            font-weight: bold;
            font-style: italic;
        }

        .kamus-python {
            color: #50fa7b;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== EDITOR AREA ===== */
        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: 1px solid #3498db;
        }

        .editor-label {
            background: #0d1117;
            padding: 8px 15px;
            color: #3498db;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #3498db;
        }

        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'Courier New', monospace !important;
            font-size: 14px !important;
            background: #0d1117 !important;
            color: #e0e0e0 !important;
        }

        .CodeMirror-gutters {
            background: #0d1117 !important;
            border-right: 1px solid #3498db !important;
        }

        .CodeMirror-linenumber {
            color: #6272a4 !important;
        }

        .CodeMirror-cursor {
            border-left-color: #f1c40f !important;
        }

        /* Syntax Highlighting */
        .cm-keyword {
            color: #ff79c6 !important;
            font-weight: bold;
        }

        .cm-string {
            color: #f1fa8c !important;
        }

        .cm-number {
            color: #bd93f9 !important;
        }

        .cm-comment {
            color: #6272a4 !important;
            font-style: italic;
        }

        .cm-variable {
            color: #8be9fd !important;
        }

        .cm-operator {
            color: #ff79c6 !important;
        }

        .cm-builtin {
            color: #50fa7b !important;
        }

        /* ===== OUTPUT AREA ===== */
        .output-section {
            display: flex;
            flex-direction: column;
            max-height: 200px;
            min-height: 100px;
            background: #0d1117;
            border-top: 1px solid #3498db;
        }

        .output-label {
            background: #161b22;
            padding: 10px 15px;
            color: #3498db;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3498db;
        }

        .output-controls {
            display: flex;
            gap: 10px;
        }

        .output-btn {
            background: none;
            border: none;
            color: #3498db;
            font-size: 12px;
            cursor: pointer;
            padding: 3px 8px;
            transition: all 0.2s;
        }

        .output-btn:hover {
            color: #f1c40f;
            text-shadow: 0 0 8px #f1c40f;
        }

        .output-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #f1fa8c;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-content.error {
            color: #ff5555;
        }

        .output-content.success {
            color: #50fa7b;
        }

        .output-content.info {
            color: #3498db;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #f1c40f;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f39c12;
            box-shadow: 0 0 8px rgba(241, 196, 15, 0.5);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 70%;
            }

            .logo-text {
                font-size: 14px;
            }

            .run-btn {
                padding: 8px 15px;
                font-size: 12px;
            }

            .kamus-table {
                font-size: 11px;
            }

            .kamus-table td,
            .kamus-table th {
                padding: 8px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
            }

            header {
                padding: 10px 12px;
            }

            .logo {
                font-size: 20px;
            }

            .logo-text {
                display: none;
            }

            .run-btn {
                padding: 8px 12px;
                font-size: 11px;
                gap: 4px;
            }

            .CodeMirror {
                font-size: 12px !important;
            }

            .output-content {
                font-size: 12px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR KAMUS -->
<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-title">📖 KAMUS PITON</span>
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-content">
        <table class="kamus-table">
            <thead>
                <tr>
                    <th>Kategori</th>
                    <th>Piton</th>
                    <th>Python</th>
                </tr>
            </thead>
            <tbody id="kamus-body"></tbody>
        </table>
    </div>
</aside>

<!-- HEADER -->
<header>
    <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="logo">
            🐍 <span class="logo-text">Piton IDE</span>
        </div>
    </div>
    <button class="run-btn" id="runBtn" onclick="runPiton()">
        ▶ Jalankan
    </button>
</header>

<!-- MAIN CONTAINER -->
<div class="main-container">
    <!-- EDITOR SECTION -->
    <div class="editor-section">
        <div class="editor-label">💻 EDITOR PITON</div>
        <div class="editor-wrapper">
            <textarea id="codeEditor">ketik("selamat datang di Piton IDE")</textarea>
        </div>
    </div>

    <!-- OUTPUT SECTION -->
    <div class="output-section">
        <div class="output-label">
            📤 OUTPUT TERMINAL
            <div class="output-controls">
                <button class="output-btn" onclick="clearOutput()">Bersihkan</button>
                <button class="output-btn" onclick="toggleOutput()">↕</button>
            </div>
        </div>
        <div class="output-content info" id="output">⏳ Loading Piton...</div>
    </div>
</div>

<script>
    // ===== DATA KAMUS =====
    const KAMUS_TABEL = [
        { kategori: "I/O", piton: "ketik", python: "print" },
        { kategori: "I/O", piton: "terima", python: "input" },
        { kategori: "Fungsi", piton: "buat", python: "def" },
        { kategori: "Fungsi", piton: "kembalikan", python: "return" },
        { kategori: "Logika", piton: "jika", python: "if" },
        { kategori: "Logika", piton: "jikalau", python: "elif" },
        { kategori: "Logika", piton: "selain", python: "else" },
        { kategori: "Loop", piton: "selagi", python: "while" },
        { kategori: "Loop", piton: "ulangi", python: "for" },
        { kategori: "Tipe Data", piton: "teks", python: "str" },
        { kategori: "Tipe Data", piton: "bilangan", python: "int" },
        { kategori: "Boolean", piton: "BENAR", python: "True" },
        { kategori: "Boolean", piton: "SALAH", python: "False" },
        { kategori: "Operator", piton: "dan", python: "and" },
        { kategori: "Modul", piton: "ambil", python: "import" },
        { kategori: "Error", piton: "coba", python: "try" },
        { kategori: "Error", piton: "tangkapi", python: "except" },
        { kategori: "Error", piton: "lontar", python: "raise" }
    ];

    // ===== TRANSLATION MAP =====
    const TRANSLATION_MAP = {
        'ketik': 'print',
        'terima': 'input',
        'buat': 'def',
        'kembalikan': 'return',
        'jika': 'if',
        'jikalau': 'elif',
        'selain': 'else',
        'selagi': 'while',
        'ulangi': 'for',
        'henti': 'break',
        'lanjut': 'continue',
        'teks': 'str',
        'bilangan': 'int',
        'desimal': 'float',
        'logika': 'bool',
        'daftar': 'list',
        'kamus': 'dict',
        'panjang': 'len',
        'jenis': 'type',
        'rentang': 'range',
        'BENAR': 'True',
        'SALAH': 'False',
        'KOSONG': 'None',
        'dan': 'and',
        'atau': 'or',
        'bukan': 'not',
        'dalam': 'in',
        'adalah': 'is',
        'ambil': 'import',
        'dari': 'from',
        'sebagai': 'as',
        'coba': 'try',
        'tangkapi': 'except',
        'bersihkan': 'finally',
        'lontar': 'raise',
        'umum': 'global',
        'lokal': 'nonlocal',
        'hapus': 'del',
        'maks': 'max',
        'min': 'min',
        'total': 'sum',
        'urut': 'sorted'
    };

    // ===== DOM ELEMENTS =====
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const outputEl = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');
    const codeEditor = document.getElementById('codeEditor');
    const kamusBody = document.getElementById('kamus-body');

    // ===== POPULATE KAMUS TABLE =====
    KAMUS_TABEL.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td class="kamus-kategori">${item.kategori}</td>
            <td class="kamus-piton">${item.piton}</td>
            <td class="kamus-python">${item.python}</td>
        `;
        kamusBody.appendChild(row);
    });

    // ===== CODEMIRROR SETUP =====
    let editor = CodeMirror.fromTextArea(codeEditor, {
        mode: 'python',
        theme: 'material-darker',
        lineNumbers: true,
        indentUnit: 4,
        matchBrackets: true,
        autoCloseBrackets: true,
        indentWithTabs: false,
        styleActiveLine: true,
        highlightSelectionMatches: { showToken: /\w/, annotateScrollbar: true }
    });

    editor.setValue('ketik("selamat datang di Piton IDE")');
    editor.setSize('100%', '100%');

    // ===== UI FUNCTIONS =====
    function toggleSidebar() {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    overlay.addEventListener('click', toggleSidebar);

    function clearOutput() {
        outputEl.textContent = '';
    }

    function toggleOutput() {
        const outputSection = document.querySelector('.output-section');
        if (outputSection.style.maxHeight === '200px') {
            outputSection.style.maxHeight = '50vh';
        } else {
            outputSection.style.maxHeight = '200px';
        }
    }

    // ===== TRANSLATION FUNCTION =====
    function translatePitonToPython(code) {
        let strings = [];
        let stringIndex = 0;

        // Extract strings
        code = code.replace(/"([^"\\]*(\\.[^"\\]*)*)"|'([^'\\]*(\\.[^'\\]*)*)'/g, function(match) {
            strings.push(match);
            return `__STRING_${stringIndex++}__`;
        });

        // Sort keys by length (longest first) to avoid partial replacements
        const sortedKeys = Object.keys(TRANSLATION_MAP).sort((a, b) => b.length - a.length);

        // Replace Piton keywords with Python
        for (let key of sortedKeys) {
            const regex = new RegExp('\\b' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g');
            code = code.replace(regex, TRANSLATION_MAP[key]);
        }

        // Restore strings
        for (let i = 0; i < strings.length; i++) {
            code = code.replace(`__STRING_${i}__`, strings[i]);
        }

        return code;
    }

    // ===== PYODIDE SETUP =====
    let pyodide = null;

    async function initPyodide() {
        try {
            pyodide = await loadPyodide();
            outputEl.className = 'output-content success';
            outputEl.textContent = '✅ Piton siap digunakan!\n\nTulis kode Piton di editor dan tekan "Jalankan".';
        } catch (e) {
            outputEl.className = 'output-content error';
            outputEl.textContent = '❌ Gagal memuat Pyodide:\n' + e.toString();
        }
    }

    setTimeout(initPyodide, 500);

    // ===== RUN CODE =====
    async function runPiton() {
        if (!pyodide) {
            outputEl.className = 'output-content error';
            outputEl.textContent = '❌ Pyodide belum siap, coba lagi dalam beberapa saat...';
            return;
        }

        const code = editor.getValue();

        if (!code.trim()) {
            outputEl.className = 'output-content info';
            outputEl.textContent = '⚠️ Kode masih kosong!';
            return;
        }

        runBtn.disabled = true;
        outputEl.className = 'output-content info';
        outputEl.textContent = '⏳ Menjalankan...';

        try {
            // Translate Piton to Python
            const pythonCode = translatePitonToPython(code);

            // Setup output capture
            await pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
            `);

            // Run the code
            await pyodide.runPython(pythonCode);

            // Get output
            const result = await pyodide.runPython('sys.stdout.getvalue()');

            outputEl.className = 'output-content success';
            outputEl.textContent = result || '✔️ Program selesai (tidak ada output).';
        } catch (e) {
            outputEl.className = 'output-content error';
            outputEl.textContent = '❌ ERROR:\n' + e.toString();
        }

        runBtn.disabled = false;
    }

    // ===== KEYBOARD SHORTCUT =====
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            runPiton();
        }
    });
</script>

</body>
</html>
